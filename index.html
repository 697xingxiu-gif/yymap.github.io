<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yymap.github.io - 项目导航</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 20px;
    padding: 40px;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  h1 {
    color: #333;
    margin-bottom: 30px;
    font-size: 28px;
  }
  .card {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    transition: transform 0.3s, box-shadow 0.3s;
    text-align: left;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  .card h2 {
    color: #667eea;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .card p {
    color: #666;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .card a {
    display: inline-block;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.3s;
  }
  .card a:hover {
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>📁 项目导航</h1>
    
    <div class="card">
      <h2>Q2 运营规划</h2>
      <p>社区家庭技能交易平台 Q2 运营规划方案，包含核心4步方法论、执行计划及目标。</p>
      <a href="Q2运营规划（最新）.html">查看 Q2 运营规划 →</a>
    </div>
  </div>
</body>
</html>
